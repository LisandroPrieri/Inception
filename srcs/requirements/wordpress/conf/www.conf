[www]
user = www-data
group = www-data

; Listen on TCP 9000 (all interfaces) instead of the Debian default Unix socket,
; so nginx in a separate container can reach php-fpm across the bridge network.
listen = 9000

; Process manager: keep a small dynamic pool of workers. All four values are
; mandatory when pm = dynamic; php-fpm refuses to start without them.
pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3

; Send PHP errors and worker output to the container's stderr, so `docker logs`
; and `make logs` show them. Same principle as mariadb's log_error = /dev/stderr.
catch_workers_output = yes
php_admin_value[error_log] = /dev/stderr
php_admin_flag[log_errors] = on