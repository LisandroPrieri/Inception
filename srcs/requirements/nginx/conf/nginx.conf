user www-data;
events {}

# Log to the container's stderr/stdout so `docker logs` and `make logs` show them.
error_log /dev/stderr;

http {
	include /etc/nginx/mime.types;
	default_type application/octet-stream;
	access_log /dev/stdout;

	server {
		# The only port exposed to the outside world; TLS is mandatory here.
		listen 443 ssl;
		server_name lprieri.42.fr;

		# Subject requirement: TLSv1.2 / TLSv1.3 only, nothing older.
		ssl_protocols TLSv1.2 TLSv1.3;
		ssl_certificate     /etc/nginx/ssl/inception.crt;
		ssl_certificate_key /etc/nginx/ssl/inception.key;

		# WordPress files, read from the volume shared with the wordpress container.
		root /var/www/html;
		index index.php;

		# Static files served directly; everything else falls through to WordPress.
		location / {
			try_files $uri $uri/ /index.php?$args;
		}

		# PHP is handed over FastCGI to php-fpm in the wordpress container.
		location ~ \.php$ {
			include fastcgi_params;
			fastcgi_pass wordpress:9000;
			fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
		}
	}
}
